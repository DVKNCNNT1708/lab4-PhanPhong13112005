openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion Service (B1)
  version: 1.0.0
  description: |
    Hợp đồng API giữa IoT Ingestion (B1) và Core Business (B6).
    Phục vụ tiếp nhận, đồng bộ dữ liệu cảm biến và hỗ trợ luồng xử lý bất đồng bộ.
  contact:
    name: Phan Lưu Phong - Nhóm 8
    email: 1771020535@dnu.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server

tags:
  - name: health
    description: Kiểm tra trạng thái hoạt động của hệ thống
  - name: telemetry
    description: Quản lý và truy xuất luồng dữ liệu đo đạc từ cảm biến

security:
  - bearerAuth: []

paths:
  # Path 1: Health check hệ thống
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint dùng để giám sát trạng thái hoạt động của Ingestion Service.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động ổn định
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status:
                    type: string
                  service:
                    type: string
              examples:
                ok:
                  value:
                    status: ok
                    service: iot-ingestion-service
    head:
      operationId: headHealth
      summary: Kiểm tra trạng thái service (HEAD)
      description: Health check endpoint supporting HEAD requests for monitoring tools.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động ổn định

  # Path 2: Tiếp nhận dữ liệu (POST) và Phân trang lịch sử (GET)
  /api/v1/telemetry:
    post:
      operationId: submitTelemetry
      summary: Nạp dữ liệu đo đạc mới
      description: Tiếp nhận dữ liệu thời gian thực từ các thiết bị IoT cảm biến trong campus.
      tags: [telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryPayload'
      responses:
        '201':
          description: Đã tiếp nhận và đưa vào hàng đợi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    get:
      operationId: listTelemetry
      summary: Lấy danh sách lịch sử đo đạc
      description: Core Business (B6) gọi API này để kéo lại danh sách dữ liệu phục vụ đồng bộ. Hỗ trợ phân trang Cursor-based.
      tags: [telemetry]
      parameters:
        - name: cursor
          in: query
          required: false
          description: Con trỏ để lấy trang tiếp theo (chuỗi mã hóa Base64)
          schema:
            type: [string, "null"]
        - name: limit
          in: query
          required: false
          description: Số lượng bản ghi tối đa trên một trang
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Trả về trang dữ liệu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Path 3: Tra cứu chi tiết một Event cụ thể
  /api/v1/telemetry/{eventId}:
    get:
      operationId: getTelemetryById
      summary: Chi tiết một gói tin telemetry
      description: Lấy thông tin chi tiết cấu trúc dữ liệu của một event đo đạc thông qua mã định danh UUID.
      tags: [telemetry]
      parameters:
        - name: eventId
          in: path
          required: true
          description: Mã định danh duy nhất của sự kiện (UUIDv4)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Path 4: Xem cấu hình lấy mẫu của thiết bị (Đảm bảo đủ 4 path cho checklist)
  /api/v1/devices/{deviceId}/config:
    get:
      operationId: getDeviceConfig
      summary: Lấy thông tin cấu hình thiết bị
      description: Truy xuất ngưỡng thiết lập và tần suất lấy mẫu hiện tại của một cảm biến cụ thể.
      tags: [telemetry]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            pattern: '^SENSOR-[0-9]{3}$'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                required: [deviceId, sampleInterval]
                properties:
                  deviceId:
                    type: string
                  sampleInterval:
                    type: integer
                    description: Tần suất lấy mẫu (tính bằng giây)
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TelemetryPayload:
      type: object
      required: [deviceId, timestamp, sensorData]
      properties:
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        timestamp:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        sensorData:
          $ref: '#/components/schemas/SensorData'

    SensorData:
      oneOf:
        - $ref: '#/components/schemas/TemperatureData'
        - $ref: '#/components/schemas/HumidityData'
      discriminator:
        propertyName: sensorType
        mapping:
          temp: '#/components/schemas/TemperatureData'
          humid: '#/components/schemas/HumidityData'

    TemperatureData:
      type: object
      required: [sensorType, value]
      properties:
        sensorType:
          type: string
          const: temp
        value:
          type: number

    HumidityData:
      type: object
      required: [sensorType, percentage]
      properties:
        sensorType:
          type: string
          const: humid
        percentage:
          type: number
          minimum: 0
          maximum: 100

    TelemetryPage:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TelemetryPayload'
        nextCursor:
          type: [string, "null"]
        hasMore:
          type: boolean

    EventAccepted:
      type: object
      required: [eventId, acceptedAt]
      properties:
        eventId:
          type: string
          format: uuid
        acceptedAt:
          type: string
          format: date-time

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: [string, "null"] }

  responses:
    BadRequest:
      description: Request sai định dạng cú pháp JSON
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Sai hoặc thiếu token xác thực Bearer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Không tìm thấy tài nguyên yêu cầu
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Vi phạm các ràng buộc logic nghiệp vụ hệ thống
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'